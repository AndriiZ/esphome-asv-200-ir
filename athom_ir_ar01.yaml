substitutions:
  name: "athom-ir"
  friendly_name: "Athom IR Controller"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"

esp8266:
  board: esp8285
  restore_from_flash: true

api:

ota:
  - platform: esphome

logger:

# Wi-Fi підтягнеться автоматично з твоїх secrets, якщо ти використовував візард
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: wpa2
  ap:
    ssid: "Athom-IR-Fallback"

captive_portal:

web_server:
  port: 80

status_led:
  pin:
    number: GPIO13
    inverted: true

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "${friendly_name} Button"

# Приймач (для зчитування кодів з твоїх старих пультів)
remote_receiver:
  pin: 
    number: GPIO5
    inverted: true
    mode:
      input: true
      pullup: true
  dump: all

# Передавач (саме він забезпечить підтримку нової інтеграції infrared в HA)
remote_transmitter:
  pin: GPIO4
  carrier_duty_percent: 50%
  
button:
  - platform: template
    name: "Power on⁄off"
    icon: "mdi:power"
    on_press:
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x0F, 0x00, 0x00, 0x00, 0x4E]
      - delay: 30ms
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x00, 0xF1, 0x80, 0x00, 0x48]

  - platform: template
    name: "⬆ Temp Up"
    icon: "mdi:thermometer-chevron-up"
    on_press:
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x0F, 0x00, 0x00, 0x00, 0x4E]
      - delay: 30ms
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x00, 0xF1, 0x08, 0x00, 0x84]

  - platform: template
    name: "⬆ Fan Speed Up"
    icon: "mdi:fan-plus"
    on_press:
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x0F, 0x00, 0x00, 0x00, 0x4E]
      - delay: 30ms
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x00, 0xF1, 0x40, 0x00, 0xC8]

  - platform: template
    name: "⬇ Fan Speed Down"
    icon: "mdi:fan-minus"
    on_press:
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x0F, 0x00, 0x00, 0x00, 0x4E]
      - delay: 30ms
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x00, 0xF1, 0x10, 0x00, 0x98]

  - platform: template
    name: "⬇ Temp Down"
    icon: "mdi:thermometer-chevron-down"
    on_press:
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x0F, 0x00, 0x00, 0x00, 0x4E]
      - delay: 30ms
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x00, 0xF1, 0x90, 0x00, 0x58]

  - platform: template
    name: "◉ Heater on⁄off"
    icon: "mdi:heating-coil"
    on_press:
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x0F, 0x00, 0x00, 0x00, 0x4E]
      - delay: 30ms
      - remote_transmitter.transmit_aeha:
          address: 0x885B
          data: [0xE9, 0x00, 0xF1, 0xA8, 0x00, 0x64]